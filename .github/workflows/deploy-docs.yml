name: Deploy Documentation

on:
  push:
    branches:
      - main
      - gh-pages
  pull_request:
    branches:
      - main
      - gh-pages
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v6
        with:
          ref: gh-pages
      
      - name: Checkout schemas and scripts from main branch
        run: |
          git fetch origin main
          git checkout origin/main -- bcsv/ catalog/ dataset/ studyflow/ trial/ event/ vocabulary/
      
      - name: Setup Python with uv
        uses: astral-sh/setup-uv@v8.2.0  # no moving `v8` major tag is published; pin the full version

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      
      - name: Generate documentation from schemas
        run: |
          uv run scripts/generate_docs.py
      
      - name: Install Node dependencies
        working-directory: ./docs
        run: npm install
      
      - name: Copy raw schemas to static directory
        run: |
          for schema in bcsv catalog dataset studyflow trial event vocabulary; do
            cp -r $schema docs/static/
          done
      
      - name: Build Docusaurus site
        working-directory: ./docs
        run: npm run build
        env:
          NODE_ENV: production
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/build

  deploy:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/gh-pages'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
