name: Deploy Documentation

# Pushing to `gh-pages` (the Docusaurus site) redeploys the docs. The actual build+deploy
# lives in the reusable workflow build-deploy-pages.yml on `main` (single source of truth),
# which main:deploy-on-main.yml also calls — so there is no duplicated build job.

on:
  push:
    branches: [gh-pages]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    uses: behaverse/schemas/.github/workflows/build-deploy-pages.yml@main
